name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17 (Eclipse Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-release-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build with Maven
        run: mvn package -DskipTests -B

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ github.ref_name }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
          files: |
            **/target/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker images
        env:
          VERSION_TAG: ${{ github.ref_name }}
        run: |
          MODULES="job-firm-gateway job-firm-auth job-firm-user-service job-firm-firm-service job-firm-job-service job-firm-order-service job-firm-payment-service job-firm-recommend-search-service job-firm-admin-service job-firm-archive-service"
          for module in $MODULES; do
            echo "Building and pushing $module:$VERSION_TAG"
            docker build \
              --build-arg MODULE_NAME=$module \
              -t ghcr.io/${{ github.repository }}/$module:$VERSION_TAG \
              -t ghcr.io/${{ github.repository }}/$module:latest \
              -f Dockerfile \
              .
            docker push ghcr.io/${{ github.repository }}/$module:$VERSION_TAG
            docker push ghcr.io/${{ github.repository }}/$module:latest
          done
